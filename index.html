<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Todo App UI</title>

    <!-- PWA & iOS Safari Support -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ToDo">
    <link rel="apple-touch-icon" href="icon-192.png">
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Mobile Drag Drop Polyfill -->
    <script src="https://unpkg.com/mobile-drag-drop/index.min.js"></script>
    <script src="https://unpkg.com/mobile-drag-drop/scroll-behaviour.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/mobile-drag-drop/default.css" />

    <!-- Tailwind Config -->
    <script>
        // Optional: Polyfill configuration
        MobileDragDrop.polyfill({
            holdToDrag: 50, // 50ms long press to drag
            dragImageCenterOnTouch: true
        });

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        appBlack: '#000000',
                        appGray: {
                            100: '#F2F2F7',
                            200: '#E5E5EA',
                            300: '#D1D1D6',
                            400: '#C7C7CC',
                            500: '#AEAEB2',
                            600: '#8E8E93',
                            700: '#3A3A3C',
                            800: '#2C2C2E',
                            900: '#1C1C1E',
                        },
                        catMorning: '#FFD60A', // Previously Rest (Yellow)
                        catAfternoon: '#00D045', // Previously Health (Green)
                        catEvening: '#0A84FF', // Previously Workout (Blue)
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom CSS to hide scrollbar for horizontal calendar and general styling */
        body {
            background-color: #000;
            color: #fff;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>

<body>

    <!-- Root element for React -->
    <div id="root"></div>

    <!-- React Code -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Components ---

        // 1. Profile Header
        const ProfileHeader = () => (
            <div className="flex justify-between items-center px-6 pt-12 pb-4">
                <div className="flex items-center space-x-3">
                    {/* Overlapping Avatars simulating the image */}
                    <div className="relative w-16 h-16">
                        <div className="absolute top-0 left-0 w-12 h-12 bg-appGray-800 rounded-full flex items-center justify-center border-2 border-black z-10">
                            <i data-lucide="user" className="w-5 h-5 text-gray-500"></i>
                        </div>
                        <div className="absolute top-2 left-6 w-12 h-12 bg-appGray-700 rounded-full flex items-center justify-center border-2 border-black z-0">
                            <i data-lucide="users" className="w-5 h-5 text-gray-400"></i>
                        </div>
                        <span className="absolute -bottom-4 left-3 text-xs font-bold text-white">me</span>
                    </div>
                </div>
                <div className="flex space-x-4">
                    {/* Placeholder for top right icons like calendar, direct etc if needed based on the image */}
                    <div className="w-8 h-8 rounded bg-transparent border border-gray-600 flex items-center justify-center">
                        <span className="text-xs font-bold">31</span>
                    </div>
                    <i data-lucide="send" className="w-6 h-6 text-white transform -rotate-45"></i>
                    <i data-lucide="more-horizontal" className="w-6 h-6 text-white"></i>
                </div>
            </div>
        );

        // Single Square Icon with white border and transparent fill (unless checked)
        const SquareIcon = ({ bgClass = 'bg-transparent', size = 'w-6 h-6', children }) => (
            <div className={`relative ${size} flex items-center justify-center rounded-lg border border-white ${bgClass} transition-colors duration-200`}>
                <div className="absolute z-10 text-[12px] font-bold text-white drop-shadow-md">
                    {children}
                </div>
            </div>
        );

        // 2. Weekly Calendar
        const WeeklyCalendar = ({ onSwipeDown, onSwipeLeft, onSwipeRight, viewDate, onSelectDay }) => {
            const [startY, setStartY] = useState(0);
            const [startX, setStartX] = useState(0);

            const handleStart = (x, y) => { setStartX(x); setStartY(y); };
            const handleEnd = (x, y) => {
                const diffY = y - startY; // positive diffY means swipe down
                const diffX = x - startX;
                if (startY > 0 && Math.abs(diffY) > 60 && Math.abs(diffY) > Math.abs(diffX)) {
                    if (diffY > 60) onSwipeDown(); // Swiping down reveals monthly calendar
                } else if (startX > 0 && Math.abs(diffX) > 60 && Math.abs(diffX) > Math.abs(diffY)) {
                    if (diffX > 60 && onSwipeRight) onSwipeRight();
                    else if (diffX < -60 && onSwipeLeft) onSwipeLeft();
                }
                setStartY(0);
                setStartX(0);
            };

            const handleTouchStart = (e) => handleStart(e.touches[0].clientX, e.touches[0].clientY);
            const handleTouchEnd = (e) => handleEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            const handleMouseDown = (e) => handleStart(e.clientX, e.clientY);
            const handleMouseUp = (e) => handleEnd(e.clientX, e.clientY);
            const handleMouseLeave = () => { setStartY(0); setStartX(0); };

            // Calculate the 7 days of the week containing viewDate (starting from Monday)
            const getWeekDays = (date) => {
                const day = date.getDay(); // 0(Sun) - 6(Sat)
                const diff = date.getDate() - (day === 0 ? 6 : day - 1); // Adjust for Monday start
                const monday = new Date(date);
                monday.setDate(diff);

                return Array.from({ length: 7 }, (_, i) => {
                    const d = new Date(monday);
                    d.setDate(monday.getDate() + i);
                    return d;
                });
            };

            const HOLIDAYS = [
                "2026-1-1", "2026-2-16", "2026-2-17", "2026-2-18", "2026-3-1",
                "2026-3-2", "2026-5-5", "2026-5-24", "2026-6-6", "2026-8-15",
                "2026-9-24", "2026-9-25", "2026-9-26", "2026-10-3", "2026-10-9", "2026-12-25"
            ];
            const isHoliday = (date) => HOLIDAYS.includes(`${date.getFullYear()}-${date.getMonth() + 1}-${date.getDate()}`);

            const weekDays = getWeekDays(viewDate);
            const dayLabels = ['월', '화', '수', '목', '금', '토', '일'];

            return (
                <div className="px-5 pb-4 mb-2 animate-fade-in cursor-grab active:cursor-grabbing mt-4"
                    onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}
                    onMouseDown={handleMouseDown} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}>
                    <div className="grid grid-cols-7 gap-y-4 gap-x-1 text-center mt-2">
                        {dayLabels.map((label, idx) => (
                            <span key={idx} className={`${idx === 5 ? 'text-[#0A84FF]' : idx === 6 ? 'text-[#FF453A]' : 'text-appGray-400'} text-xs font-medium mb-1`}>
                                {label}
                            </span>
                        ))}

                        {weekDays.map((date, idx) => {
                            const isSelected = date.toDateString() === viewDate.toDateString();
                            let textClass = 'text-white';
                            if (date.getDay() === 0 || isHoliday(date)) textClass = 'text-[#FF453A]';
                            else if (date.getDay() === 6) textClass = 'text-[#0A84FF]';

                            return (
                                <div key={idx} className="flex flex-col items-center justify-center space-y-0.5 relative h-[38px] cursor-pointer" onClick={() => onSelectDay(date)}>
                                    <div className="absolute inset-0 flex items-center justify-center top-0">
                                        <div className="w-[28px] h-[28px] rounded-full bg-appGray-700 opacity-60"></div>
                                    </div>
                                    <div className={`relative z-10 w-7 h-7 flex items-center justify-center rounded-full text-[14px] transition-colors duration-200 ${isSelected ? 'bg-white text-black font-bold' : textClass}`}>
                                        {date.getDate()}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div >
            );
        };

        const MonthlyCalendar = ({ onSwipeUp, onSwipeLeft, onSwipeRight, viewDate, onSelectDay }) => {
            const [startY, setStartY] = useState(0);
            const [startX, setStartX] = useState(0);

            const handleStart = (x, y) => { setStartX(x); setStartY(y); };
            const handleEnd = (x, y) => {
                const diffY = startY - y; // positive diffY means swipe up
                const diffX = x - startX;
                if (startY > 0 && Math.abs(diffY) > 60 && Math.abs(diffY) > Math.abs(diffX)) {
                    if (diffY > 60) onSwipeUp(); // Swiping up hides monthly, shows weekly
                } else if (startX > 0 && Math.abs(diffX) > 60 && Math.abs(diffX) > Math.abs(diffY)) {
                    if (diffX > 60 && onSwipeRight) onSwipeRight();
                    else if (diffX < -60 && onSwipeLeft) onSwipeLeft();
                }
                setStartY(0);
                setStartX(0);
            };

            const handleTouchStart = (e) => handleStart(e.touches[0].clientX, e.touches[0].clientY);
            const handleTouchEnd = (e) => handleEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            const handleMouseDown = (e) => handleStart(e.clientX, e.clientY);
            const handleMouseUp = (e) => handleEnd(e.clientX, e.clientY);
            const handleMouseLeave = () => { setStartY(0); setStartX(0); };

            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();

            const firstDayOfMonth = new Date(year, month, 1);
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // Monday start: 0(Mon) - 6(Sun)
            const startDay = (firstDayOfMonth.getDay() === 0 ? 6 : firstDayOfMonth.getDay() - 1);

            const calendarGrid = [];
            for (let i = 0; i < startDay; i++) calendarGrid.push(null);
            for (let i = 1; i <= daysInMonth; i++) calendarGrid.push(i);

            const dayLabels = ['월', '화', '수', '목', '금', '토', '일'];

            const HOLIDAYS = [
                "2026-1-1", "2026-2-16", "2026-2-17", "2026-2-18", "2026-3-1",
                "2026-3-2", "2026-5-5", "2026-5-24", "2026-6-6", "2026-8-15",
                "2026-9-24", "2026-9-25", "2026-9-26", "2026-10-3", "2026-10-9", "2026-12-25"
            ];
            const isHoliday = (date) => HOLIDAYS.includes(`${date.getFullYear()}-${date.getMonth() + 1}-${date.getDate()}`);

            return (
                <div className="px-5 pb-4 mb-2 animate-fade-in cursor-grab active:cursor-grabbing mt-4"
                    onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}
                    onMouseDown={handleMouseDown} onMouseUp={handleMouseUp} onMouseLeave={handleMouseLeave}>
                    <div className="grid grid-cols-7 gap-y-4 gap-x-1 text-center mt-2">
                        {dayLabels.map((label, idx) => (
                            <span key={idx} className={`${idx === 5 ? 'text-[#0A84FF]' : idx === 6 ? 'text-[#FF453A]' : 'text-appGray-400'} text-xs font-medium mb-1`}>
                                {label}
                            </span>
                        ))}

                        {calendarGrid.map((day, idx) => {
                            if (day === null) return <div key={`empty-${idx}`}></div>;

                            const date = new Date(year, month, day);
                            const isSelected = date.toDateString() === viewDate.toDateString();

                            let textClass = 'text-white';
                            if (idx % 7 === 6 || isHoliday(date)) textClass = 'text-[#FF453A]';
                            else if (idx % 7 === 5) textClass = 'text-[#0A84FF]';

                            return (
                                <div key={day} className="flex flex-col items-center justify-center space-y-0.5 relative h-[38px] cursor-pointer" onClick={() => onSelectDay(date)}>
                                    <div className="absolute inset-0 flex items-center justify-center top-0">
                                        <div className="w-[28px] h-[28px] rounded-full bg-appGray-700 opacity-60"></div>
                                    </div>
                                    <div className={`relative z-10 w-7 h-7 flex items-center justify-center rounded-full text-[14px] transition-colors duration-200 ${isSelected ? 'bg-white text-black font-bold' : textClass}`}>
                                        {day}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div >
            );
        };

        // 3. Category Header & Container
        const TodoCategory = ({ title, colorClass, onAdd, children, onDropCategory, isDragOverCategory, onDragOverCategory, onDragLeaveCategory }) => {
            const handleDragOver = (e) => {
                if (title === 'Routine') return;
                e.preventDefault(); // Necessary to allow dropping
                if (onDragOverCategory) onDragOverCategory(title);
            };

            const handleDragLeave = (e) => {
                if (title === 'Routine') return;
                if (onDragLeaveCategory) onDragLeaveCategory();
            };

            const handleDrop = (e) => {
                if (title === 'Routine') return;
                e.preventDefault();
                onDropCategory(title);
            };

            return (
                <div
                    className={`flex flex-col rounded-b-lg border-b transition-colors ${isDragOverCategory ? 'border-white' : 'border-transparent'}`}
                    onDragOver={handleDragOver}
                    onDragLeave={handleDragLeave}
                    onDrop={handleDrop}
                >
                    <div className="flex items-center px-6 py-1 mt-1">
                        <div className="flex items-center justify-between bg-appGray-800 rounded-full pl-3 pr-1 py-1 space-x-2 min-w-[120px]">
                            <div className="flex items-center space-x-2 pl-1 pr-2 py-0.5">
                                {title === 'Routine' && <i data-lucide="repeat" className="w-4 h-4 text-white"></i>}
                                {title === 'Morning' && <i data-lucide="sun" className="w-4 h-4 text-catMorning"></i>}
                                {title === 'Afternoon' && <i data-lucide="clover" className="w-4 h-4 text-catAfternoon"></i>}
                                {title === 'Evening' && <i data-lucide="moon" className="w-4 h-4 text-catEvening"></i>}
                                <span className="text-sm font-bold text-white">{title}</span>
                            </div>
                            <button
                                onClick={(e) => { e.stopPropagation(); onAdd && onAdd(); }}
                                className="w-7 h-7 rounded-full bg-appGray-700 flex items-center justify-center active:bg-appGray-600 transition-colors"
                            >
                                <i data-lucide="plus" className="w-4 h-4 text-white"></i>
                            </button>
                        </div>
                    </div>
                    {/* Render children (tasks) here inside the droppable area */}
                    <div className="mt-1 min-h-[30px] pb-1">
                        {children}
                    </div>
                </div>
            );
        };

        // 4. Todo Item
        const TodoItem = ({
            id, text, categoryColor, status,
            onStatusChange, onEdit, onDelete, onEditComplete,
            draggable, isDragged, isDragOver,
            onDragStart, onDragOver, onDrop, onDragEnd
        }) => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [isOptionsMenuOpen, setIsOptionsMenuOpen] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [editValue, setEditValue] = useState(text);
            const inputRef = useRef(null);

            useEffect(() => {
                if (isEditing && inputRef.current) {
                    inputRef.current.focus();
                }
            }, [isEditing]);

            useEffect(() => {
                if (isMenuOpen || isOptionsMenuOpen) {
                    lucide.createIcons();
                }
            }, [isMenuOpen, isOptionsMenuOpen]);

            // Map the background color class to a text color class for the icons
            const activeColorClass = categoryColor.replace('bg-', 'text-');

            const handleIconClick = (e) => {
                e.stopPropagation(); // prevent triggering other clicks
                setIsMenuOpen(!isMenuOpen);
                setIsOptionsMenuOpen(false);
            };

            const handleOptionsClick = (e) => {
                e.stopPropagation();
                setIsOptionsMenuOpen(!isOptionsMenuOpen);
                setIsMenuOpen(false);
            };

            const selectStatus = (newStatus, e) => {
                e.stopPropagation();
                onStatusChange(newStatus);
                setIsMenuOpen(false);
            };

            const handleEdit = (e) => {
                e.stopPropagation();
                setIsOptionsMenuOpen(false);
                setIsEditing(true);
                setEditValue(text);
            };

            const handleSaveEdit = () => {
                if (editValue.trim() !== '' && editValue !== text) {
                    if (onEdit) onEdit(editValue);
                } else {
                    setEditValue(text);
                }
                setIsEditing(false);
            };

            const isComposingRef = useRef(false);

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !isComposingRef.current) {
                    e.preventDefault();
                    handleSaveEdit();
                    if (onEditComplete) onEditComplete();
                } else if (e.key === 'Escape') {
                    setEditValue(text);
                    setIsEditing(false);
                }
            };

            const handleDelete = (e) => {
                e.stopPropagation();
                setIsOptionsMenuOpen(false);
                if (onDelete) onDelete();
            };

            // Status Icon Helper
            const renderStatusIcon = () => {
                switch (status) {
                    case 'done': return <i data-lucide="check" className={`w-3.5 h-3.5 ${activeColorClass}`}></i>;
                    case 'in-progress': return <i data-lucide="circle" className={`w-3.5 h-3.5 ${activeColorClass}`}></i>;
                    case 'postpone': return <i data-lucide="arrow-right" className={`w-3.5 h-3.5 ${activeColorClass}`}></i>;
                    case 'cancel': return <i data-lucide="x" className={`w-3.5 h-3.5 ${activeColorClass}`}></i>;
                    default: return null;
                }
            };

            // Text Style Helper
            const getTextStyle = () => {
                if (status === 'done') {
                    return 'text-appGray-300 line-through decoration-appGray-600';
                }
                return 'text-white';
            };

            return (
                <div
                    className={`flex items-center justify-between px-6 py-1.5 cursor-pointer group relative ${isDragged ? 'opacity-50' : ''} ${isDragOver ? 'border-t border-white' : 'border-t border-transparent'}`}
                    draggable={draggable}
                    onDragStart={(e) => draggable && onDragStart(e, id)}
                    onDragOver={(e) => {
                        if (draggable) {
                            e.preventDefault();
                            onDragOver(e, id);
                        }
                    }}
                    onDrop={(e) => {
                        if (draggable) {
                            e.preventDefault();
                            onDrop(e, id);
                        }
                    }}
                    onDragEnd={onDragEnd}
                >
                    <div className="flex items-center space-x-4 flex-1">
                        <div className="transition-transform duration-200 active:scale-95 flex-shrink-0" onClick={handleIconClick}>
                            <SquareIcon bgClass="bg-transparent" size="w-6 h-6">
                                <span key={status}>
                                    {renderStatusIcon()}
                                </span>
                            </SquareIcon>
                        </div>
                        {isEditing ? (
                            <input
                                ref={inputRef}
                                type="text"
                                value={editValue}
                                onChange={(e) => setEditValue(e.target.value)}
                                onBlur={handleSaveEdit}
                                onKeyDown={handleKeyDown}
                                onCompositionStart={() => { isComposingRef.current = true; }}
                                onCompositionEnd={() => { isComposingRef.current = false; }}
                                className="bg-transparent border-b border-appGray-500 text-[15px] text-white outline-none w-full"
                                onClick={(e) => e.stopPropagation()}
                            />
                        ) : (
                            <span className={`text-[15px] break-all ${getTextStyle()}`}>
                                {text}
                            </span>
                        )}
                    </div>
                    <div onClick={handleOptionsClick} className="cursor-pointer p-1 -mr-1 flex-shrink-0">
                        <i data-lucide="more-horizontal" className="w-5 h-5 text-appGray-600 opacity-50 group-hover:opacity-100"></i>
                    </div>

                    {/* Status Selection Popup Menu */}
                    {isMenuOpen && (
                        <>
                            <div className="fixed inset-0 z-[100]" onClick={(e) => { e.stopPropagation(); setIsMenuOpen(false); }}></div>
                            <div className="absolute left-12 top-8 z-[110] bg-appGray-800 rounded-lg shadow-2xl border border-appGray-700 py-1.5 w-[108px] flex flex-col" onClick={(e) => e.stopPropagation()}>
                                <button className="flex items-center space-x-3 px-4 py-2 hover:bg-appGray-700 text-white text-sm" onClick={(e) => selectStatus('done', e)}>
                                    <i data-lucide="check" className={`w-4 h-4 ${activeColorClass}`}></i>
                                    <span>완료</span>
                                </button>
                                <button className="flex items-center space-x-3 px-4 py-2 hover:bg-appGray-700 text-white text-sm" onClick={(e) => selectStatus('in-progress', e)}>
                                    <i data-lucide="circle" className={`w-4 h-4 ${activeColorClass}`}></i>
                                    <span>진행중</span>
                                </button>
                                <button className="flex items-center space-x-3 px-4 py-2 hover:bg-appGray-700 text-white text-sm" onClick={(e) => selectStatus('postpone', e)}>
                                    <i data-lucide="arrow-right" className={`w-4 h-4 ${activeColorClass}`}></i>
                                    <span>미루기</span>
                                </button>
                                <button className="flex items-center space-x-3 px-4 py-2 hover:bg-appGray-700 text-white text-sm" onClick={(e) => selectStatus('cancel', e)}>
                                    <i data-lucide="x" className={`w-4 h-4 ${activeColorClass}`}></i>
                                    <span>취소</span>
                                </button>
                                <div className="border-t border-appGray-700 my-1"></div>
                                <button className="flex items-center space-x-3 px-4 py-2 hover:bg-appGray-700 text-appGray-400 text-sm" onClick={(e) => selectStatus('none', e)}>
                                    <div className="w-4 h-4 border border-appGray-500 rounded-sm"></div>
                                    <span>비우기</span>
                                </button>
                            </div>
                        </>
                    )}

                    {/* Options Selection Popup Menu */}
                    {isOptionsMenuOpen && (
                        <>
                            <div className="fixed inset-0 z-[100]" onClick={(e) => { e.stopPropagation(); setIsOptionsMenuOpen(false); }}></div>
                            <div className="absolute right-6 top-8 z-[110] bg-appGray-800 rounded-lg shadow-2xl border border-appGray-700 py-1 w-[60px] flex flex-col" onClick={(e) => e.stopPropagation()}>
                                <button className="w-full flex justify-center items-center py-1.5 hover:bg-appGray-700 text-white text-[13px]" onClick={handleEdit}>
                                    <span>수정</span>
                                </button>
                                <div className="border-t border-appGray-700 my-1 w-full"></div>
                                <button className="w-full flex justify-center items-center py-1.5 hover:bg-appGray-700 text-red-500 text-[13px]" onClick={handleDelete}>
                                    <span>삭제</span>
                                </button>
                            </div>
                        </>
                    )}
                </div>
            );
        };

        // 4.5. Inline Task Input
        const InlineTaskInput = ({ categoryColor, onSave, onCancel }) => {
            const [text, setText] = useState('');
            const inputRef = useRef(null);
            const isSavingRef = useRef(false);
            const isComposingRef = useRef(false);
            const textRef = useRef('');
            const ignoreBlurRef = useRef(false);

            // Keep textRef in sync with text state
            useEffect(() => { textRef.current = text; }, [text]);

            useEffect(() => {
                if (inputRef.current) inputRef.current.focus();
            }, []);

            const handleSubmit = () => {
                const val = textRef.current.trim();
                // We use isSavingRef to prevent overlapping saves, but reset it quickly.
                if (val && !isSavingRef.current) {
                    isSavingRef.current = true;
                    setText('');
                    textRef.current = '';

                    // Prevent blur from closing the input immediately after Enter
                    ignoreBlurRef.current = true;
                    setTimeout(() => { ignoreBlurRef.current = false; }, 500);

                    onSave(val);
                    isSavingRef.current = false; // Reset IMMEDIATELY so user can type the next item fast

                    if (inputRef.current) inputRef.current.focus();
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !isComposingRef.current) {
                    e.preventDefault();
                    handleSubmit();
                } else if (e.key === 'Escape') {
                    onCancel();
                }
            };

            const handleBlur = () => {
                setTimeout(() => {
                    if (ignoreBlurRef.current || isSavingRef.current) return;
                    const val = textRef.current.trim();
                    if (val) {
                        isSavingRef.current = true;
                        onSave(val);
                    }
                    onCancel();
                }, 150);
            };

            return (
                <div className="flex items-center space-x-4 px-6 py-1.5 animate-fade-in">
                    <div className="flex-shrink-0 cursor-pointer" onMouseDown={(e) => { e.preventDefault(); handleSubmit(); }}>
                        <SquareIcon bgClass="bg-transparent" size="w-6 h-6">
                            <i data-lucide="plus" className={`w-3.5 h-3.5 ${categoryColor.replace('bg-', 'text-')}`}></i>
                        </SquareIcon>
                    </div>
                    <input
                        ref={inputRef}
                        type="text"
                        value={text}
                        onChange={(e) => setText(e.target.value)}
                        onKeyDown={handleKeyDown}
                        onCompositionStart={() => { isComposingRef.current = true; }}
                        onCompositionEnd={() => { isComposingRef.current = false; }}
                        onBlur={handleBlur}
                        placeholder="할 일을 입력하세요..."
                        className="bg-transparent border-b border-appGray-700 text-[15px] text-white outline-none w-full py-0.5"
                    />
                </div>
            );
        };

        // 5. Bottom Navigation
        const BottomNav = () => (
            <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-black bg-opacity-95 backdrop-blur-md border-t border-appGray-900 pb-safe pt-2 px-6 flex justify-between items-center z-50">
                <div className="flex flex-col items-center space-y-1 w-16 mb-2">
                    <i data-lucide="home" className="w-6 h-6 text-white" fill="white"></i>
                    <span className="text-[10px] text-white font-medium">피드</span>
                </div>
                <div className="flex flex-col items-center space-y-1 w-16 mb-2">
                    <i data-lucide="compass" className="w-6 h-6 text-appGray-600"></i>
                    <span className="text-[10px] text-appGray-600 font-medium">둘러보기</span>
                </div>
                <div className="flex flex-col items-center space-y-1 w-16 mb-2 relative">
                    <div className="relative">
                        <i data-lucide="bell" className="w-6 h-6 text-appGray-600"></i>
                        <div className="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full outline outline-2 outline-black"></div>
                    </div>
                    <span className="text-[10px] text-appGray-600 font-medium">알림</span>
                </div>
                <div className="flex flex-col items-center space-y-1 w-16 mb-2">
                    <i data-lucide="user" className="w-6 h-6 text-appGray-600"></i>
                    <span className="text-[10px] text-appGray-600 font-medium">My</span>
                </div>
            </div>
        );

        // 6. Date Picker Modal (Dropdown style)
        const DatePickerDropdown = ({ isOpen, onClose, onSelect, initialDate }) => {
            const years = Array.from({ length: 21 }, (_, i) => 2016 + i); // 2016 to 2036
            const months = Array.from({ length: 12 }, (_, i) => i + 1);

            const [selectedYear, setSelectedYear] = useState(initialDate.getFullYear());
            const [selectedMonth, setSelectedMonth] = useState(initialDate.getMonth() + 1);

            const yearListRef = useRef(null);
            const monthListRef = useRef(null);

            useEffect(() => {
                if (isOpen) {
                    const yearIdx = years.indexOf(initialDate.getFullYear());
                    const monthIdx = months.indexOf(initialDate.getMonth() + 1);

                    setSelectedYear(initialDate.getFullYear());
                    setSelectedMonth(initialDate.getMonth() + 1);

                    // Small timeout to allow render before scroll
                    setTimeout(() => {
                        if (yearListRef.current) {
                            yearListRef.current.scrollTop = yearIdx * 40;
                        }
                        if (monthListRef.current) {
                            monthListRef.current.scrollTop = monthIdx * 40;
                        }
                    }, 50);
                }
            }, [isOpen, initialDate]);

            if (!isOpen) return null;

            return (
                <div className="absolute top-10 left-0 w-64 bg-appGray-800 rounded-xl shadow-2xl border border-appGray-700 z-[200] animate-fade-in truncate">
                    <div className="flex justify-between items-center px-4 py-3 border-b border-appGray-700">
                        <span className="text-white font-bold text-[14px]">날짜 선택</span>
                        <div className="flex space-x-3">
                            <button onClick={onClose} className="text-appGray-400 text-[13px]">취소</button>
                            <button onClick={() => {
                                onSelect(new Date(selectedYear, selectedMonth - 1, 1));
                                onClose();
                            }} className="text-[#0A84FF] font-bold text-[13px]">완료</button>
                        </div>
                    </div>
                    <div className="flex justify-center items-center h-48 relative overflow-hidden px-2">
                        {/* Selection Highlight */}
                        <div className="absolute top-1/2 -translate-y-1/2 w-[90%] h-10 bg-appGray-700 rounded-lg pointer-events-none opacity-50"></div>

                        <div className="flex w-full h-full relative">
                            {/* Year Scroller */}
                            <div ref={yearListRef} className="flex-1 overflow-y-auto no-scrollbar snap-y snap-mandatory py-[76px]" style={{ height: '100%' }}>
                                {years.map(year => (
                                    <div
                                        key={year}
                                        onClick={() => setSelectedYear(year)}
                                        className={`h-10 flex text-[18px] items-center justify-center snap-center cursor-pointer transition-colors ${selectedYear === year ? 'text-white font-bold' : 'text-appGray-500'}`}
                                    >
                                        {year}년
                                    </div>
                                ))}
                            </div>
                            {/* Month Scroller */}
                            <div ref={monthListRef} className="flex-1 overflow-y-auto no-scrollbar snap-y snap-mandatory py-[76px]" style={{ height: '100%' }}>
                                {months.map(month => (
                                    <div
                                        key={month}
                                        onClick={() => setSelectedMonth(month)}
                                        className={`h-10 flex text-[18px] items-center justify-center snap-center cursor-pointer transition-colors ${selectedMonth === month ? 'text-white font-bold' : 'text-appGray-500'}`}
                                    >
                                        {month}월
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyBKpQiCW0B30lAsqQCcbj4dzNqqm66eyuc",
            authDomain: "todolist-ec35b.firebaseapp.com",
            projectId: "todolist-ec35b",
            storageBucket: "todolist-ec35b.firebasestorage.app",
            messagingSenderId: "805920873146",
            appId: "1:805920873146:web:2c59a3c72998b789db0083"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- Main App Component ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [loadingAuth, setLoadingAuth] = useState(true);

            const [calendarMode, setCalendarMode] = useState('weekly'); // 'weekly' or 'monthly'
            const [viewDate, setViewDate] = useState(new Date()); // Default to today
            const [isDatePickerOpen, setIsDatePickerOpen] = useState(false);
            const [addingToCategory, setAddingToCategory] = useState({ category: null, afterId: null });

            // Drag and Drop State
            const [draggedItemIdx, setDraggedItemIdx] = useState(null);
            const [draggedItemId, setDraggedItemId] = useState(null);
            const [dragOverItemId, setDragOverItemId] = useState(null);
            const [dragOverCategoryName, setDragOverCategoryName] = useState(null);

            const [todos, setTodos] = useState([]);

            // 0. Setup Anonymous Authentication and handle Redirect Results
            useEffect(() => {


                const unsubscribe = auth.onAuthStateChanged(user => {
                    if (user) {
                        setUser(user);
                        setLoadingAuth(false);
                    } else {
                        auth.signInAnonymously().catch(error => {
                            console.error("Auth Error:", error);
                            setLoadingAuth(false);
                        });
                    }
                });
                return () => unsubscribe();
            }, []);

            // 1. Initial Data Load & Migration from localStorage
            useEffect(() => {
                if (!user) return;

                const userTodosRef = db.collection('users').doc(user.uid).collection('todos');

                const unsubscribe = userTodosRef.onSnapshot(snapshot => {
                    const firestoreTodos = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));

                    if (firestoreTodos.length === 0) {
                        // Check for existing localStorage data to migrate
                        const savedTodos = localStorage.getItem('puppyReactTasks');
                        if (savedTodos) {
                            const parsed = JSON.parse(savedTodos);
                            parsed.forEach((todo, idx) => {
                                todo.order = idx * 1024; // Assign initial order
                                userTodosRef.doc(todo.id.toString()).set(todo);
                            });
                            localStorage.removeItem('puppyReactTasks');
                        } else {
                            // First time ever - start completely blank as requested
                        }
                    } else {
                        // State update from firestore, sorted by order
                        setTodos(firestoreTodos.sort((a, b) => (a.order || 0) - (b.order || 0) || String(a.id).localeCompare(String(b.id))));
                    }
                });

                return () => unsubscribe();
            }, [user]);

            const formatDate = (date) => `${date.getFullYear()}-${date.getMonth() + 1}-${date.getDate()}`;
            const viewDateKey = formatDate(viewDate);

            const handlePrev = () => {
                const newDate = new Date(viewDate);
                if (calendarMode === 'weekly') {
                    newDate.setDate(viewDate.getDate() - 7);
                } else {
                    newDate.setMonth(viewDate.getMonth() - 1);
                }
                setViewDate(newDate);
            };

            // --- Handlers for Native Android App ---
            useEffect(() => {
                // Flutter will call this function with the Google ID Token
                window.onAndroidGoogleLoginSuccess = async (idToken) => {
                    const credential = firebase.auth.GoogleAuthProvider.credential(idToken);
                    try {
                        const userCredential = await auth.currentUser.linkWithCredential(credential);
                        alert("✅ 네이티브 구글 연동에 성공했습니다!");
                    } catch (error) {
                        if (error.code === 'auth/credential-already-in-use') {
                            const confirmSwitch = confirm("이 구글 계정에는 이미 다른 투두리스트 데이터가 있습니다.\n기존 계정으로 로그인하시겠습니까?\n(주의: 현재 기기에 작성한 데이터는 사라집니다)");
                            if (confirmSwitch) {
                                try {
                                    await auth.signInWithCredential(error.credential || credential);
                                } catch (signInErr) {
                                    alert("로그인 중 오류가 발생했습니다.");
                                }
                            }
                        } else {
                            console.error("Native link error:", error);
                            alert("네이티브 연동 중 오류가 발생했습니다: " + error.message);
                        }
                    }
                };

                window.onAndroidGoogleLoginError = (errorMessage) => {
                    alert("구글 로그인 실패: " + errorMessage);
                };

                return () => {
                    window.onAndroidGoogleLoginSuccess = null;
                    window.onAndroidGoogleLoginError = null;
                };
            }, [user]);

            const handleNext = () => {
                const newDate = new Date(viewDate);
                if (calendarMode === 'weekly') {
                    newDate.setDate(viewDate.getDate() + 7);
                } else {
                    newDate.setMonth(viewDate.getMonth() + 1);
                }
                setViewDate(newDate);
            };

            // Detect if running inside a WebView
            const isWebView = /wv|WebView/i.test(navigator.userAgent) ||
                (navigator.userAgent.includes('Android') && navigator.userAgent.includes('Version/'));

            const linkWithGoogle = async () => {
                if (!user) return;

                if (window.AndroidAuth) {
                    window.AndroidAuth.postMessage('loginWithGoogle');
                    return;
                } else if (isWebView) {
                    const openInChrome = confirm(
                        "구글 로그인은 보안 정책상 앱 내에서 직접 할 수 없습니다.\n\nChrome 브라우저에서 열어서 로그인하시겠습니까?"
                    );
                    if (openInChrome) {
                        window.open('https://dabinivy.github.io/To-do-List/', '_blank');
                    }
                    return;
                }

                try {
                    setLoadingAuth(true);
                    const provider = new firebase.auth.GoogleAuthProvider();
                    const result = await user.linkWithPopup(provider);
                    console.log("Popup link successful", result);
                    alert("✅ 구글 계정과 성공적으로 연동되었습니다!");
                    setLoadingAuth(false);
                } catch (error) {
                    setLoadingAuth(false);
                    if (error.code === 'auth/credential-already-in-use') {
                        const confirmSwitch = confirm("이 구글 계정에는 이미 저장된 투두리스트 데이터가 있습니다.\n\n기존 데이터를 불러오시겠습니까?\n(주의: 현재 기기에 작성한 연동 전 데이터는 사라집니다)");
                        if (confirmSwitch) {
                            const provider = new firebase.auth.GoogleAuthProvider();
                            provider.setCustomParameters({ prompt: 'select_account' });
                            auth.signInWithPopup(provider).then(() => {
                                alert("✅ 기존 구글 계정의 데이터를 성공적으로 불러왔습니다!");
                            }).catch(err => {
                                if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
                                    alert("로그인 중 오류가 발생했습니다: " + err.message);
                                }
                            });
                        }
                    } else if (error.code !== 'auth/popup-closed-by-user' && error.code !== 'auth/cancelled-popup-request') {
                        console.error("Link error:", error);
                        alert("구글 연동 중 오류가 발생했습니다: " + error.message);
                    }
                }
            };

            const changeStatus = (id, newStatus) => {
                if (!user) return;
                const userTodosRef = db.collection('users').doc(user.uid).collection('todos');
                const task = todos.find(t => t.id === id);
                if (!task) return;

                if (task.category === 'Routine') {
                    userTodosRef.doc(id.toString()).set({
                        statuses: {
                            ...(task.statuses || {}),
                            [viewDateKey]: newStatus
                        }
                    }, { merge: true });
                } else {
                    const oldStatus = task.status;
                    userTodosRef.doc(id.toString()).set({ status: newStatus }, { merge: true });

                    // If postponed, create a copy for the next day
                    if (newStatus === 'postpone' && oldStatus !== 'postpone') {
                        const taskDate = new Date(task.startDate);
                        taskDate.setDate(taskDate.getDate() + 1);
                        const newDocRef = userTodosRef.doc();
                        const newPostponedTask = {
                            ...task,
                            startDate: formatDate(taskDate),
                            status: 'none',
                            originalId: task.id
                        };
                        delete newPostponedTask.id; // Removed explicitly since we spread task
                        newDocRef.set(newPostponedTask);
                    }

                    // If postpone is cancelled, remove the copy from the next day
                    if (oldStatus === 'postpone' && newStatus !== 'postpone') {
                        // Find and delete tasks that were postponed from this one
                        todos.filter(t => t.originalId === id).forEach(postponedTask => {
                            userTodosRef.doc(postponedTask.id).delete();
                        });
                    }
                }
            };

            const editTodo = (id, newText) => {
                if (!user) return;
                // Optimistic UI update
                setTodos(prev => prev.map(t => t.id === id ? { ...t, text: newText } : t));
                db.collection('users').doc(user.uid).collection('todos').doc(id.toString()).set({ text: newText }, { merge: true })
                    .catch(e => alert("수정 실패: " + e.message));
            };

            const deleteTodo = (id) => {
                if (!user) return;
                const userTodosRef = db.collection('users').doc(user.uid).collection('todos');
                const task = todos.find(t => t.id === id);
                if (!task) return;

                if (task.category === 'Routine') {
                    // Optimistic UI: hide routine from this date forward
                    setTodos(prev => prev.map(t => t.id === id ? { ...t, endDate: viewDateKey } : t));
                    userTodosRef.doc(id.toString()).set({ endDate: viewDateKey }, { merge: true })
                        .catch(e => alert("삭제 실패: " + e.message));
                } else {
                    // Optimistic UI: remove from list immediately
                    const postponedIds = todos.filter(t => t.originalId === id).map(t => t.id);
                    setTodos(prev => prev.filter(t => t.id !== id && !postponedIds.includes(t.id)));
                    userTodosRef.doc(id.toString()).delete()
                        .catch(e => alert("삭제 실패: " + e.message));
                    postponedIds.forEach(pid => {
                        userTodosRef.doc(pid).delete().catch(() => { });
                    });
                }
            };

            // --- Drag and Drop Handlers ---
            const handleDragStart = (e, id) => {
                const idx = todos.findIndex(t => t.id === id);
                setDraggedItemIdx(idx);
                setDraggedItemId(id);
                // Required for Firefox
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', id);
            };

            const handleDragOver = (e, targetId) => {
                e.preventDefault(); // Necessary to allow dropping
                e.stopPropagation(); // Stop event from bubbling to category
                setDragOverCategoryName(null);
                if (draggedItemId === targetId) return;
                setDragOverItemId(targetId);
            };

            const handleDragOverCategory = (categoryName) => {
                setDragOverItemId(null);
                setDragOverCategoryName(categoryName);
            };

            const handleDragLeaveCategory = () => {
                setDragOverCategoryName(null);
            };

            const handleDropOnItem = (e, targetId) => {
                e.preventDefault();
                e.stopPropagation();
                setDragOverItemId(null);

                if (draggedItemId === null || draggedItemId === targetId) return;

                const draggedTask = todos.find(t => t.id === draggedItemId);
                const targetTask = todos.find(t => t.id === targetId);
                if (!draggedTask || !targetTask) return;

                const targetCategory = targetTask.category;
                const sourceCategory = draggedTask.category;

                // Get all items in the target category, sorted
                const originalCatItems = todos
                    .filter(t => t.category === targetCategory)
                    .sort((a, b) => (a.order || 0) - (b.order || 0) || String(a.id).localeCompare(String(b.id)));

                // Remove dragged item from list (may or may not be in this category)
                const catItems = originalCatItems.filter(t => t.id !== draggedItemId);

                // Find where the target is in the filtered array
                const targetIdxInCat = catItems.findIndex(t => t.id === targetId);

                // Determine insert position
                let insertIdx = targetIdxInCat;
                if (sourceCategory === targetCategory) {
                    const origDragIdx = originalCatItems.findIndex(t => t.id === draggedItemId);
                    const origTargetIdx = originalCatItems.findIndex(t => t.id === targetId);
                    if (origDragIdx < origTargetIdx) {
                        insertIdx = targetIdxInCat + 1; // dragging down → after target
                    }
                }

                // Insert dragged item at calculated position
                catItems.splice(insertIdx, 0, draggedTask);

                // Batch update ALL items in this category with fresh order values
                const batch = db.batch();
                if (user) {
                    const userTodosRef = db.collection('users').doc(user.uid).collection('todos');
                    catItems.forEach((t, i) => {
                        batch.update(userTodosRef.doc(String(t.id)), {
                            order: i * 1024,
                            category: targetCategory
                        });
                    });
                    batch.commit().catch(err => console.error("Drop batch error:", err));
                }

                setDraggedItemId(null);
                setDraggedItemIdx(null);
            };

            const handleDropOnCategory = (categoryName) => {
                setDragOverCategoryName(null);
                if (draggedItemId === null || categoryName === 'Routine' || !user) return;

                const draggedTask = todos.find(t => t.id === draggedItemId);
                if (!draggedTask) return;

                // Place at the bottom of the target category
                const catItems = todos.filter(t => t.category === categoryName && t.id !== draggedItemId);
                const maxOrder = catItems.length > 0 ? Math.max(...catItems.map(t => t.order || 0)) : 0;

                const userTodosRef = db.collection('users').doc(user.uid).collection('todos');
                userTodosRef.doc(String(draggedItemId)).update({
                    category: categoryName,
                    order: maxOrder + 1024
                }).catch(err => console.error("Category drop error:", err));

                setDraggedItemId(null);
                setDraggedItemIdx(null);
            };

            const handleDragEnd = () => {
                setDraggedItemId(null);
                setDraggedItemIdx(null);
                setDragOverItemId(null);
                setDragOverCategoryName(null);
            };

            // Lucide icons initialization
            useEffect(() => {
                lucide.createIcons();
            });

            const categories = [
                { name: 'Routine', colorClass: 'text-white', bgClass: 'text-white' },
                { name: 'Morning', colorClass: 'text-catMorning', bgClass: 'bg-catMorning' },
                { name: 'Afternoon', colorClass: 'text-catAfternoon', bgClass: 'bg-catAfternoon' },
                { name: 'Evening', colorClass: 'text-catEvening', bgClass: 'bg-catEvening' },
            ];

            if (loadingAuth) {
                return (
                    <div className="max-w-md mx-auto min-h-screen bg-appBlack flex items-center justify-center">
                        <div className="text-white text-sm opacity-50">인증 중...</div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen bg-appBlack text-white pb-24 relative select-none overflow-x-hidden">
                    {/* <ProfileHeader /> User requested to remove this section */}

                    <div className="flex justify-between items-center px-5 pt-8 pb-2">
                        <div className="flex items-center space-x-2 relative">
                            <span
                                className="text-xl font-bold cursor-pointer hover:opacity-80 transition-opacity active:scale-95"
                                onClick={() => setIsDatePickerOpen(!isDatePickerOpen)}
                            >
                                {viewDate.getFullYear()}년 {viewDate.getMonth() + 1}월
                            </span>

                            <DatePickerDropdown
                                isOpen={isDatePickerOpen}
                                initialDate={viewDate}
                                onClose={() => setIsDatePickerOpen(false)}
                                onSelect={(newDate) => {
                                    const updatedDate = new Date(viewDate);
                                    updatedDate.setFullYear(newDate.getFullYear());
                                    updatedDate.setMonth(newDate.getMonth());

                                    if (updatedDate.getMonth() !== newDate.getMonth()) {
                                        updatedDate.setDate(0);
                                    }

                                    setViewDate(updatedDate);
                                }}
                            />
                        </div>
                        <div className="flex items-center space-x-3">
                            {user && user.isAnonymous ? (
                                <button
                                    onClick={linkWithGoogle}
                                    className="bg-blue-600/20 text-blue-400 rounded-full px-3 h-7 text-[12px] font-bold active:bg-blue-600/30 flex items-center justify-center transition-colors"
                                >
                                    <i data-lucide="log-in" className="w-3.5 h-3.5 mr-1.5"></i> Google 연동
                                </button>
                            ) : (
                                <span className="bg-green-600/20 text-green-400 rounded-full px-3 h-7 text-[12px] font-bold flex items-center justify-center">
                                    <i data-lucide="check-circle" className="w-3.5 h-3.5 mr-1.5"></i> 연동됨
                                </span>
                            )}
                            <button
                                onClick={() => {
                                    setViewDate(new Date());
                                }}
                                className="bg-appGray-800 rounded-full px-3 h-7 text-[13px] font-bold active:bg-appGray-700 flex items-center justify-center transition-colors hover:bg-appGray-700"
                            >
                                Today
                            </button>
                        </div>
                    </div>

                    {calendarMode === 'monthly' ? (
                        <MonthlyCalendar onSwipeUp={() => setCalendarMode('weekly')} onSwipeLeft={handleNext} onSwipeRight={handlePrev} viewDate={viewDate} onSelectDay={setViewDate} />
                    ) : (
                        <WeeklyCalendar onSwipeDown={() => setCalendarMode('monthly')} onSwipeLeft={handleNext} onSwipeRight={handlePrev} viewDate={viewDate} onSelectDay={setViewDate} />
                    )}

                    <div className="mt-1 space-y-1">
                        {categories.map(cat => {
                            const catTodos = todos.filter(t => {
                                if (t.category !== cat.name) return false;

                                if (t.category === 'Routine') {
                                    const start = new Date(t.startDate);
                                    const current = new Date(viewDateKey);
                                    const end = t.endDate ? new Date(t.endDate) : null;

                                    // Must be on or after startDate, and before endDate if set
                                    return current >= start && (!end || current < end);
                                }

                                return t.startDate === viewDateKey;
                            });

                            return (
                                <TodoCategory
                                    key={cat.name}
                                    title={cat.name}
                                    colorClass={cat.colorClass}
                                    onAdd={() => setAddingToCategory({ category: cat.name, afterId: null })}
                                    onDropCategory={handleDropOnCategory}
                                    isDragOverCategory={dragOverCategoryName === cat.name}
                                    onDragOverCategory={handleDragOverCategory}
                                    onDragLeaveCategory={handleDragLeaveCategory}
                                >
                                    {catTodos.map((todo, index) => {
                                        const currentStatus = todo.category === 'Routine'
                                            ? (todo.statuses[viewDateKey] || 'none')
                                            : todo.status;

                                        return (
                                            <React.Fragment key={todo.id}>
                                                <TodoItem
                                                    id={todo.id}
                                                    text={todo.text}
                                                    categoryColor={cat.bgClass}
                                                    isChecked={currentStatus === 'done'}
                                                    status={currentStatus}
                                                    draggable={cat.name !== 'Routine'}
                                                    isDragged={draggedItemId === todo.id}
                                                    isDragOver={dragOverItemId === todo.id}
                                                    onDragStart={handleDragStart}
                                                    onDragOver={handleDragOver}
                                                    onDrop={handleDropOnItem}
                                                    onDragEnd={handleDragEnd}
                                                    onToggle={(e) => { e.stopPropagation(); }}
                                                    onStatusChange={(newStatus) => changeStatus(todo.id, newStatus)}
                                                    onEdit={(newText) => {
                                                        editTodo(todo.id, newText);
                                                    }}
                                                    /* onEditComplete removed: editing should not trigger consecutive entry */
                                                    onDelete={() => {
                                                        if (todo.category === 'Routine') {
                                                            const msg = '이 루틴을 오늘부터 중단하시겠습니까? (과거 기록은 유지됩니다)';
                                                            if (confirm(msg)) {
                                                                deleteTodo(todo.id);
                                                            }
                                                        } else {
                                                            deleteTodo(todo.id);
                                                        }
                                                    }}
                                                />
                                                {addingToCategory.category === cat.name && addingToCategory.afterId === todo.id && (
                                                    <InlineTaskInput
                                                        key={`input-after-${todo.id}`}
                                                        categoryColor={cat.bgClass}
                                                        onSave={(text) => {
                                                            const newId = Date.now().toString();
                                                            const currentIdx = catTodos.findIndex(t => t.id === todo.id);
                                                            const nextTodo = catTodos[currentIdx + 1];
                                                            let newOrder = (todo.order || 0) + 512;
                                                            if (nextTodo) {
                                                                newOrder = ((todo.order || 0) + (nextTodo.order || 0)) / 2;
                                                            }
                                                            const newTask = {
                                                                text: text,
                                                                category: cat.name,
                                                                startDate: viewDateKey,
                                                                order: newOrder
                                                            };
                                                            if (cat.name === 'Routine') {
                                                                newTask.statuses = {};
                                                            } else {
                                                                newTask.status = 'none';
                                                            }
                                                            // Optimistically update to avoid unmount flicker
                                                            setTodos(prev => {
                                                                const updated = [...prev, { id: newId, ...newTask }];
                                                                return updated.sort((a, b) => (a.order || 0) - (b.order || 0) || String(a.id).localeCompare(String(b.id)));
                                                            });
                                                            if (user) {
                                                                db.collection('users').doc(user.uid).collection('todos').doc(newId).set(newTask)
                                                                    .catch(e => alert("저장 실패: " + e.message));
                                                            }
                                                            // Don't change afterId — keeps InlineTaskInput mounted so mobile keyboard stays open
                                                            // setAddingToCategory({ category: cat.name, afterId: newId });
                                                        }}
                                                        onCancel={() => setAddingToCategory({ category: null, afterId: null })}
                                                    />
                                                )}
                                            </React.Fragment>
                                        );
                                    })}
                                    {addingToCategory.category === cat.name && addingToCategory.afterId === null && (
                                        <InlineTaskInput
                                            key={`input-bottom-${cat.name}`}
                                            categoryColor={cat.bgClass}
                                            onSave={(text) => {
                                                const newId = Date.now().toString();
                                                const maxOrder = catTodos.length > 0 ? Math.max(...catTodos.map(t => t.order || 0)) : 0;
                                                const newTask = {
                                                    text: text,
                                                    category: cat.name,
                                                    startDate: viewDateKey,
                                                    order: maxOrder + 1024
                                                };
                                                if (cat.name === 'Routine') {
                                                    newTask.statuses = {};
                                                } else {
                                                    newTask.status = 'none';
                                                }
                                                // Optimistic update
                                                setTodos(prev => {
                                                    const updated = [...prev, { id: newId, ...newTask }];
                                                    return updated.sort((a, b) => (a.order || 0) - (b.order || 0) || String(a.id).localeCompare(String(b.id)));
                                                });
                                                if (user) {
                                                    db.collection('users').doc(user.uid).collection('todos').doc(newId).set(newTask)
                                                        .catch(e => alert("저장 실패: " + e.message));
                                                }
                                                // Keep adding at the bottom
                                            }}
                                            onCancel={() => setAddingToCategory({ category: null, afterId: null })}
                                        />
                                    )}
                                </TodoCategory>
                            );
                        })}
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('ServiceWorker 등록 성공!');
                    })
                    .catch(error => {
                        console.log('ServiceWorker 등록 실패: ', error);
                    });
            });
        }
    </script>
</body>

</html>
